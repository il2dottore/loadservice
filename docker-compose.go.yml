services:
  attack-node-router:
    image: ${DOCKERHUB_USERNAME:?Set DOCKERHUB_USERNAME}/loadservice-attack-node-router:latest
    env_file:
      - ./attack-node-router/.env
    restart: unless-stopped

  api-gateway:
    image: ${DOCKERHUB_USERNAME:?Set DOCKERHUB_USERNAME}/loadservice-api-gateway:latest
    env_file:
      - ./api-gateway/.env
    volumes:
      - ./api-gateway/config.json:/app/config.json:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
