services:
  common:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: common
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped

  attack:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: attack
    env_file:
      - .env
    ports:
      - "4000:4000"
    restart: unless-stopped

  payment:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: payment
    env_file:
      - .env
    ports:
      - "5000:5000"
    restart: unless-stopped
