name: Terraform ECR infrastructure

on:
  pull_request:
    paths:
      - "terraform/ecr/**"
      - ".github/workflows/terraform-ecr.yml"
  push:
    branches: [main]
    paths:
      - "terraform/ecr/**"
      - ".github/workflows/terraform-ecr.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_WORKING_DIR: terraform/ecr
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform format and validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform fmt -check -recursive
          terraform validate

      - name: Terraform plan
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -var="aws_region=${{ secrets.AWS_REGION }}"

      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve -var="aws_region=${{ secrets.AWS_REGION }}"
