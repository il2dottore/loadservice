name: Build and release Go binaries

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Go services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false

      - name: Build Linux binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          build() {
            local directory="$1"
            local binary="$2"
            local goos="$3"
            local extension="$4"
            pushd "$directory" >/dev/null
            CGO_ENABLED=0 GOOS="$goos" GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o "../release/${binary}-${goos}-amd64${extension}" .
            popd >/dev/null
          }

          build reverse-proxy reverse-proxy linux ""
          build attack-node-service attack-node-service linux ""
          build attack-node-router attack-node-router linux ""

          sha256sum release/* > release/SHA256SUMS
          tar -czf "release/loadservice-go-linux-amd64-${GITHUB_SHA::7}.tar.gz" -C release \
            reverse-proxy-linux-amd64 \
            attack-node-service-linux-amd64 \
            attack-node-router-linux-amd64

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release/loadservice-go-*.tar.gz release/*-linux-amd64 release/SHA256SUMS \
            --title "Go binaries ${GITHUB_REF_NAME}" \
            --target "$GITHUB_SHA" \
            --generate-notes
