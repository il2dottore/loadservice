name: Build and release Go binaries

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Go services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false

      - name: Build Linux and Windows binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          build() {
            local directory="$1"
            local binary="$2"
            local goos="$3"
            local extension="$4"
            pushd "$directory" >/dev/null
            CGO_ENABLED=0 GOOS="$goos" GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o "../release/${binary}-${goos}-amd64${extension}" .
            popd >/dev/null
          }

          for target in linux windows; do
            extension=""
            if [[ "$target" == "windows" ]]; then extension=".exe"; fi
            build reverse-proxy reverse-proxy "$target" "$extension"
            build attack-node-service attack-node-service "$target" "$extension"
            build attack-node-router attack-node-router "$target" "$extension"
          done

          sha256sum release/* > release/SHA256SUMS
          tar -czf "release/darkservice-go-linux-amd64-${GITHUB_SHA::7}.tar.gz" -C release \
            reverse-proxy-linux-amd64 \
            attack-node-service-linux-amd64 \
            attack-node-router-linux-amd64
          zip -j "release/darkservice-go-windows-amd64-${GITHUB_SHA::7}.zip" \
            release/*-windows-amd64.exe

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="go-build-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          gh release create "$tag" release/darkservice-go-*.tar.gz release/darkservice-go-*.zip release/*-linux-amd64 release/*-windows-amd64.exe release/SHA256SUMS \
            --title "Go binaries ${GITHUB_SHA::7}" \
            --target "$GITHUB_SHA" \
            --generate-notes
