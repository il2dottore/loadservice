name: Build Node.js services

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/build-node-services.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/build-node-services.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-node-services-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build common, attack and payment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Node.js services
        run: pnpm run build

      - name: Verify service entrypoints
        shell: bash
        run: |
          set -euo pipefail
          for service in common attack payment; do
            test -f "dist/apps/${service}/main.js"
            test -f "dist/apps/${service}/app.module.js"
          done

      - name: Upload build artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: node-services-${{ github.sha }}
          path: |
            backend/dist/apps/common/**
            backend/dist/apps/attack/**
            backend/dist/apps/payment/**
            backend/dist/libs/**
          if-no-files-found: error
          retention-days: 14

  docker:
    name: Push ${{ matrix.service }} image
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [common, attack, payment]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/loadservice-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
